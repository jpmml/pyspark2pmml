name: pytest

on:
  push:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python: '3.9'
            pyspark: '3.4.4'
            xgboost: '2.1.4'
            java: '11'
            jpmml-sparkml-packages: 'org.jpmml:pmml-sparkml:3.0.11,org.jpmml:pmml-sparkml-xgboost:3.0.11,com.google.guava:guava:33.5.0-jre,ml.dmlc:xgboost4j-spark_2.12:2.1.4'
          - python: '3.11'
            pyspark: '3.5.8'
            xgboost: '3.1.0'
            java: '11'
            jpmml-sparkml-packages: 'org.jpmml:pmml-sparkml:3.1.11,org.jpmml:pmml-sparkml-xgboost:3.1.11,com.google.guava:guava:33.5.0-jre,ml.dmlc:xgboost4j-spark_2.12:3.1.0'
          - python: '3.11'
            pyspark: '4.0.2'
            java: '17'
            jpmml-sparkml-packages: 'org.jpmml:pmml-sparkml:3.2.10'
          - python: '3.11'
            pyspark: '4.1.1'
            java: '17'
            jpmml-sparkml-packages: 'org.jpmml:pmml-sparkml:3.3.3'

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: ${{ matrix.java }}
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python }}
        cache: 'pip'
    - run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install numpy pyspark==${{ matrix.pyspark }}
        if [ -n "${{ matrix.xgboost }}" ]; then pip install pandas pyarrow scikit-learn xgboost==${{ matrix.xgboost }}; fi
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - run: |
        python -m pytest
      env:
        JPMML_SPARKML_PACKAGES: ${{ matrix.jpmml-sparkml-packages }}
